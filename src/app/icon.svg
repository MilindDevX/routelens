<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient: deep indigo to violet -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>

    <!-- Lens glass highlight gradient -->
    <radialGradient id="glassGrad" cx="38%" cy="35%" r="55%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.0)"/>
    </radialGradient>

    <!-- Subtle inner shadow for depth -->
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.35)"/>
    </filter>

    <!-- Glow filter for the lens ring -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="roundedClip">
      <rect width="512" height="512" rx="112"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <g clip-path="url(#roundedClip)">
    <rect width="512" height="512" fill="url(#bgGrad)"/>

    <!-- Subtle grid lines for tech feel -->
    <line x1="0" y1="170" x2="512" y2="170" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <line x1="0" y1="341" x2="512" y2="341" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <line x1="170" y1="0" x2="170" y2="512" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <line x1="341" y1="0" x2="341" y2="512" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  </g>

  <!-- Outer lens ring (main circle) -->
  <circle
    cx="228"
    cy="232"
    r="138"
    fill="none"
    stroke="rgba(255,255,255,0.95)"
    stroke-width="30"
    filter="url(#glow)"
    clip-path="url(#roundedClip)"
  />

  <!-- Inner lens cross-hair: horizontal line -->
  <line
    x1="128" y1="232" x2="328" y2="232"
    stroke="rgba(255,255,255,0.30)"
    stroke-width="16"
    stroke-linecap="round"
    clip-path="url(#roundedClip)"
  />
  <!-- Inner lens cross-hair: vertical line -->
  <line
    x1="228" y1="130" x2="228" y2="334"
    stroke="rgba(255,255,255,0.30)"
    stroke-width="16"
    stroke-linecap="round"
    clip-path="url(#roundedClip)"
  />

  <!-- Lens handle (tilted, thick, rounded) -->
  <line
    x1="334" y1="326"
    x2="415" y2="415"
    stroke="rgba(255,255,255,0.95)"
    stroke-width="40"
    stroke-linecap="round"
    clip-path="url(#roundedClip)"
    filter="url(#glow)"
  />

  <!-- Glass highlight overlay -->
  <circle cx="228" cy="232" r="138" fill="url(#glassGrad)" clip-path="url(#roundedClip)"/>
</svg>
